# Containerized workspace for the three agent CLIs. Build context is the
# repo root (not this docker/ directory), since the Dockerfile COPYs from
# claude/, copilot/, pi/, agents/ at paths relative to the repo root.
#
# Usage (see zsh/agent-containers.zsh for the wrapper that sets REPO_PATH
# automatically): from the project you want the agent working on,
#   REPO_PATH=$PWD docker compose -f ~/REPO/mohan-dotfiles/docker/docker-compose.yml run --rm claude
#
# Each service's $HOME (auth.json, trust.json, session history) lives in its
# own named volume, not on the host filesystem — it persists across runs
# without ever writing to the machine outside the mounted repo. Hooks,
# skills, and settings are re-synced into that volume from the image on
# every start (see entrypoint.sh), so they never go stale even though the
# volume itself is long-lived.
services:
  claude:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: claude
    command: ["claude", "--dangerously-skip-permissions"]
    # Passes a host-side corporate/proxy CA bundle (CURL_CA_BUNDLE, if set)
    # into the container so entrypoint.sh's self-heal `curl` can verify TLS
    # on networks that SSL-inspect. The volume line falls back to a
    # /dev/null:/dev/null no-op bind when the var is unset, since Compose
    # needs a real source path either way.
    environment:
      - CURL_CA_BUNDLE
      - NODE_EXTRA_CA_CERTS=${CURL_CA_BUNDLE:-}
    volumes:
      - ${REPO_PATH:-.}:/workspace
      # Whole $HOME, not just $HOME/.claude: Claude Code's OAuth/onboarding
      # state lives in $HOME/.claude.json, a file *outside* .claude/ that a
      # narrower mount would silently drop on every `--rm` recreation,
      # forcing a fresh login each launch.
      - claude-agent-home:/root
      - ${CURL_CA_BUNDLE:-/dev/null}:${CURL_CA_BUNDLE:-/dev/null}:ro
    working_dir: /workspace
    user: root
    stdin_open: true
    tty: true

  copilot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: copilot
    command: ["copilot", "--yolo"]
    volumes:
      - ${REPO_PATH:-.}:/workspace
      - copilot-agent-home:/root/.copilot
    working_dir: /workspace
    user: root
    stdin_open: true
    tty: true

  pi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: pi
    volumes:
      - ${REPO_PATH:-.}:/workspace
      - pi-agent-home:/root/.pi
    working_dir: /workspace
    user: root
    stdin_open: true
    tty: true

volumes:
  claude-agent-home:
  copilot-agent-home:
  pi-agent-home:
